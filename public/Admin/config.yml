backend:
  name: git-gateway
  branch: main # تأكد أن هذا هو اسم الفرع الرئيسي عندك في جيت هاب

media_folder: "public/images" # المجلد الذي ستُحفظ فيه الصور
public_folder: "/images"

collections:
  - name: "services"
    label: "الخدمات والأسعار"
    folder: "src/content/services"
    extension: "json"
    format: "json"
    create: true
    fields:
      - { label: "اسم الخدمة", name: "title", widget: "string" }
      - { label: "السعر", name: "price", widget: "string" }
      - { label: "الوصف", name: "description", widget: "text" }
